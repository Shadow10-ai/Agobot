services:
  # ─── Backend (FastAPI + ML) ──────────────────────────────────────────
  - type: web
    name: agobot-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.prod.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT --workers 1
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URL
        sync: false          # set manually in Render dashboard
      - key: DB_NAME
        value: agobot_prod
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a strong secret
      - key: BINANCE_API_KEY
        sync: false          # set manually in Render dashboard
      - key: BINANCE_API_SECRET
        sync: false          # set manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ─── Frontend (React → static site) ─────────────────────────────────
  - type: web
    name: agobot-frontend
    runtime: static
    rootDir: frontend
    buildCommand: yarn install && yarn build
    staticPublishPath: build
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false          # set to backend URL after backend is deployed
